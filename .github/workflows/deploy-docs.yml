name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so Starlight's `lastUpdated` (git log per file) is accurate.
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
      - name: Install dependencies
        working-directory: docs
        run: npm ci
      - name: Build docs
        working-directory: docs
        run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
      - name: Refresh root sitemap
        env:
          GH_TOKEN: ${{ secrets.PAGES_REFRESH_TOKEN }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PAGES_REFRESH_TOKEN is not configured; skipping root sitemap refresh."
            exit 0
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/sergeyshmakov/sergeyshmakov.github.io/dispatches \
            -d "{\"event_type\":\"project-docs-deployed\",\"client_payload\":{\"repository\":\"$SOURCE_REPOSITORY\",\"page_url\":\"$PAGE_URL\",\"run_id\":\"$SOURCE_RUN_ID\",\"sha\":\"$SOURCE_SHA\"}}"
